<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEIC 練習</title>

<style>
body { font-family: Arial; padding: 15px; background: #f5f5f5; }
h1 { font-size: 20px; }

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-top: 15px;
}

.question { font-size: 20px; }
input { width: 100%; padding: 10px; font-size: 18px; margin-top: 10px; }

button {
  width: 100%;
  padding: 12px;
  font-size: 18px;
  margin-top: 10px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 8px;
}

.result { margin-top: 10px; font-size: 18px; }

.select {
  margin-top: 10px;
  padding: 8px;
  font-size: 16px;
}
</style>
</head>

<body>

<h1>📘 TOEIC 練習</h1>

<select id="level" class="select" onchange="changeLevel()">
  <option value="all">全部</option>
  <option value="easy">簡單</option>
  <option value="medium">中等</option>
  <option value="hard">困難</option>
  <option value="wrong">錯題</option>
</select>

<div class="card">
  <div id="question"></div>
  <input id="answer" placeholder="輸入答案">
  <button onclick="checkAnswer()">提交</button>
  <div class="result" id="result"></div>
</div>

<script>
let allQuestions = [];
let filtered = [];
let wrongList = JSON.parse(localStorage.getItem("wrongList") || "[]");

let currentQ;
let currentLevel = "all";

// 載入題庫
fetch("questions.json")
  .then(res => res.json())
  .then(data => {
    allQuestions = data;
    applyFilter();
  });

function applyFilter() {
  if (currentLevel === "wrong") {
    filtered = allQuestions.filter(q => wrongList.includes(q.q));
  } else if (currentLevel === "all") {
    filtered = [...allQuestions];
  } else {
    filtered = allQuestions.filter(q => q.level === currentLevel);
  }

  shuffle(filtered);
  showQuestion();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function showQuestion() {
  if (filtered.length === 0) {
    document.getElementById("question").innerText = "（目前沒有題目）";
    return;
  }

  currentQ = filtered.pop();

  document.getElementById("question").innerHTML =
    "✏️ " + currentQ.q;
}

function checkAnswer() {
  let user = document.getElementById("answer").value.toLowerCase();

  if (user === currentQ.a) {
    document.getElementById("result").innerHTML =
      "✅ 正確<br>答案：" + currentQ.a + "<br>" + currentQ.m;

    // 從錯題移除
    wrongList = wrongList.filter(q => q !== currentQ.q);
  } else {
    document.getElementById("result").innerHTML =
      "❌ 錯誤<br>答案：" + currentQ.a + "<br>" + currentQ.m;

    if (!wrongList.includes(currentQ.q)) {
      wrongList.push(currentQ.q);
    }
  }

  localStorage.setItem("wrongList", JSON.stringify(wrongList));

  document.getElementById("answer").value = "";
  showQuestion();
}

function changeLevel() {
  currentLevel = document.getElementById("level").value;
  applyFilter();
}
</script>

</body>
</html>
